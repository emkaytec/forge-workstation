---
- name: Install developer tool packages
  ansible.builtin.apt:
    name: "{{ dev_tools_packages }}"
    state: present

- name: Install developer tool compatibility symlinks
  ansible.builtin.file:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    state: link
    owner: root
    group: root
    force: true
  loop: "{{ dev_tools_symlinks }}"
